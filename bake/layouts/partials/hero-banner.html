<section
  class="relative bg-cover bg-center bg-no-repeat"
  style="background-image: url('/images/hero.png'); min-height: 320px; height: 55vh;"
>
  <div class="absolute inset-0 bg-black/50 flex items-center justify-center">
    <div class="text-center text-white px-4 max-w-3xl">
      <h1 class="text-4xl md:text-5xl font-bold mb-3">{{ .title }}</h1>
      {{ with .subtitle }}
        <p class="text-lg md:text-xl">{{ . }}</p>
      {{ end }}
    </div>
  </div>
</section>
